name: Deploy Website to Cloud Run

on:
  workflow_dispatch:
  workflow_call:
  workflow_run:
    workflows: ['Deploy Router to Cloud Run']
    types:
      - completed

env:
  GEN: ${{ secrets.GEN || 'ws1' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    # When triggered by workflow_run, only proceed if the upstream workflow succeeded
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Google Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Get Router URL
        id: router-url
        run: |
          ROUTER_URL=$(gcloud run services describe ${{ vars.ACTOR }}-router \
            --region us-central1 \
            --format 'value(status.url)')
          echo "Resolved router URL: $ROUTER_URL"
          echo "url=$ROUTER_URL" >> $GITHUB_OUTPUT

      - name: Get MCP Server URL
        id: mcp-url
        run: |
          MCP_URL=$(gcloud run services describe ${{ vars.ACTOR }}-mcp-server \
            --region us-central1 \
            --format 'value(status.url)')
          echo "Resolved MCP server URL: $MCP_URL"
          echo "url=$MCP_URL" >> $GITHUB_OUTPUT

      - name: Deploy Website to Cloud Run
        run: |
          gcloud run deploy ${{ vars.ACTOR }}-website \
            --image gcr.io/summit-enterprise-workshop/website:latest \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --set-env-vars "ROUTER_URL=${{ steps.router-url.outputs.url }},MCP_SERVER_URL=${{ steps.mcp-url.outputs.url }},ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --timeout 60s \
            --concurrency 80
