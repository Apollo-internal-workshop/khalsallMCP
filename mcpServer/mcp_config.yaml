# Apollo MCP Server Configuration
# This configuration uses GraphOS-managed schema and persisted queries

# GraphOS credentials (can be overridden by environment variables)
graphos:
  apollo_key: ${env.APOLLO_KEY}
  apollo_graph_ref: ${env.APOLLO_GRAPH_REF}

# Target GraphQL endpoint
endpoint: ${env.ENDPOINT}

# Schema source - fetch from GraphOS Uplink
schema:
  source: uplink

# Transport configuration for HTTP
transport:
  type: streamable_http
  port: 8000
  address: 0.0.0.0
  stateful_mode: true

# Health check configuration
health_check:
  enabled: true
  path: "/health"

# CORS configuration for browser clients
cors:
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
    - OPTIONS
  allow_headers:
    - content-type
    - mcp-protocol-version
    - mcp-session-id
    - traceparent
    - tracestate

# Enable introspection tools
introspection:
  introspect:
    enabled: true
    minify: true
  search:
    enabled: true
    minify: true
  validate:
    enabled: true
  execute:
    enabled: true
    minify: true

# Security overrides
overrides:
  mutation_mode: "explicit"  # Only allow explicitly defined mutations
  enable_explorer: true

# Logging configuration
logging:
  level: "info"
